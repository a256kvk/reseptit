<!DOCTYPE html>
<html>

<head>
  <title>{% block title %}{% endblock %}</title>
</head>

<body>
  <div>
  {% if session.user_id %}
  <p>
  {{session.username}}
  </p>
  {% endif %}

  {% if session.user_id %}
  <a href="/logout">Kirjaudu ulos</a>

  {% else %}
  <a href="/login">Kirjaudu sisään</a>

  <a href="/register">Rekisteröidy</a>

  {% endif %}
  </div>
  {% block content %}{% endblock %}
</body>
</html>
